<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>workout timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header class="top">
      <h1>workout timer</h1>
      <p class="sub">hiit, tabata, emom. pick one or roll your own.</p>
    </header>

    <section class="presets">
      <button class="preset" data-preset="tabata">tabata <span>20/10 x8</span></button>
      <button class="preset" data-preset="hiit">classic hiit <span>30/30 x10</span></button>
      <button class="preset" data-preset="emom">emom <span>60s x10</span></button>
      <button class="preset" data-preset="custom">custom</button>
    </section>

    <section class="custom" id="customPanel">
      <div class="row">
        <label>work
          <input id="workSec" type="number" min="5" max="600" value="40" />
        </label>
        <label>rest
          <input id="restSec" type="number" min="0" max="600" value="20" />
        </label>
        <label>rounds
          <input id="rounds" type="number" min="1" max="50" value="8" />
        </label>
      </div>
      <button id="applyCustom" class="apply">use these</button>
    </section>

    <section class="stage">
      <svg class="ring" viewBox="0 0 240 240" aria-hidden="true">
        <circle class="ring-bg" cx="120" cy="120" r="108" />
        <circle id="arc" class="ring-arc" cx="120" cy="120" r="108"
                transform="rotate(-90 120 120)" />
      </svg>
      <div class="readout">
        <div id="phase" class="phase">ready</div>
        <div id="time" class="time">00:40</div>
        <div id="roundInfo" class="round">round 1 of 8</div>
        <div id="nextLine" class="next">next: rest 20s</div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">start</button>
      <button id="pauseBtn" class="ghost" disabled>pause</button>
      <button id="resetBtn" class="ghost">reset</button>
    </section>

    <footer class="foot">
      <p>beep on every phase change. last custom set is remembered.</p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
